<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedCare | Modern Appointment System</title>
<style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
    }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background: var(--bg); 
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
        line-height: 1.6;
    }

    .container { 
        max-width: 600px; 
        margin: auto; 
        background: var(--card-bg); 
        padding: 32px; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    h2 { 
        text-align: center; 
        margin-top: 0;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: -0.5px;
    }

    .form-group { margin-bottom: 20px; }

    label { 
        display: block; 
        font-weight: 600; 
        margin-bottom: 8px; 
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    input, select { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid var(--border); 
        border-radius: 8px; 
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    button {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 10px;
    }

    button:hover { background: var(--primary-hover); }

    .btn-secondary {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        margin-top: 20px;
    }

    .btn-secondary:hover { background: #f1f5f9; color: var(--text-main); }

    /* Token Design */
    .token-box { 
        display: none; 
        border: 2px solid var(--primary); 
        padding: 24px; 
        margin-top: 30px; 
        background: #eff6ff; 
        text-align: center; 
        border-radius: 12px;
        animation: fadeIn 0.5s ease-out;
    }

    .token-id { 
        font-size: 48px; 
        font-weight: 800; 
        color: var(--primary); 
        margin-bottom: 8px; 
    }

    .token-details {
        text-align: left;
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 0.95rem;
    }

    /* Admin Styles */
    .admin-panel { display: none; max-width: 900px; }
    
    table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 24px; 
        font-size: 0.9rem;
    }

    th { 
        background: #f1f5f9; 
        text-align: left; 
        padding: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.75rem;
    }

    td { padding: 12px; border-bottom: 1px solid var(--border); }
    
    tr:hover { background: #f8fafc; }

    .admin-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<!-- Appointment Booking -->
<div class="container" id="userApp">
    <h2>MedCare Booking</h2>
    
    <div class="form-group">
        <label>Full Name</label>
        <input id="name" placeholder="Enter your name">
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label>Age</label>
            <input id="age" type="number">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Sex</label>
            <select id="sex">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Select Specialist</label>
        <select id="doctor">
            <option>Dr. Smith (Cardiology)</option>
            <option>Dr. Sarah (Pediatrics)</option>
            <option>Dr. Lee (Neurology)</option>
            <option>Dr. Patel (Dermatology)</option>
            <option>Dr. Wong (General Medicine)</option>
        </select>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label>Date</label>
            <input id="date" type="date">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Preferred Time</label>
            <input id="time" type="time">
        </div>
    </div>

    <button onclick="book()">Confirm Appointment</button>

    <div class="token-box" id="tokenBox">
        <div class="token-id" id="tokenNumber"></div>
        <div class="token-details" id="tokenDetails"></div>
        <button onclick="window.print()" style="background: #059669;">Print Confirmation</button>
    </div>

    <button class="btn-secondary" onclick="showAdmin()">Staff Dashboard Login</button>
</div>

<!-- Admin Login -->
<div class="container" id="adminLogin" style="display:none;">
    <h2>Staff Access</h2>
    <div class="form-group">
        <label>Administrative Password</label>
        <input id="adminPass" type="password" placeholder="••••••••">
    </div>
    <button onclick="adminAuth()">Login to Dashboard</button>
    <button class="btn-secondary" onclick="location.reload()">Back to Booking</button>
</div>

<!-- Admin Dashboard -->
<div class="container admin-panel" id="adminPanel">
    <h2>Admin Dashboard</h2>
    
    <div class="admin-actions">
        <button onclick="downloadPDF()" style="background: #6366f1;">Export Data</button>
        <button onclick="window.print()" style="background: #0ea5e9;">Print List</button>
        <button onclick="clearAll()" style="background: #ef4444;">Purge All</button>
    </div>

    <table id="appTable">
        <thead>
            <tr>
                <th>Token</th>
                <th>Patient</th>
                <th>Specialist</th>
                <th>Date</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button class="btn-secondary" onclick="location.reload()">Logout</button>
</div>

<script>
    //[cite: 1] Logic preserved from original source
    let PASS = "1234";
    let data = JSON.parse(localStorage.getItem("appointments") || "[]");

    function todayKey() { return new Date().toISOString().split("T")[0]; }
    function getTodayTokens() { return data.filter(a => a.date === todayKey()); }
    function nextToken() { return getTodayTokens().length + 1; }

    function book() {
        let n = document.getElementById('name').value.trim();
        let a = document.getElementById('age').value;
        let s = document.getElementById('sex').value;
        let d = document.getElementById('doctor').value;
        let dt = document.getElementById('date').value;
        let tm = document.getElementById('time').value;

        if(!n || !a || !dt || !tm){ alert("Please fill in all medical details."); return; }

        let userDayCount = data.filter(x => x.name.toLowerCase() === n.toLowerCase() && x.date === dt).length;
        if(userDayCount >= 2){ alert("Limit reached: Max 2 bookings per patient per day."); return; }

        let docCount = data.filter(x => x.doctor === d && x.date === dt).length;
        if(docCount >= 32){ alert("Doctor is fully booked for this date."); return; }

        let token = nextToken();
        let obj = { token, name:n, age:a, sex:s, doctor:d, date:dt, time:tm };
        data.push(obj);
        localStorage.setItem("appointments", JSON.stringify(data));

        document.getElementById('tokenNumber').innerText = "#" + token;
        document.getElementById('tokenDetails').innerHTML = `
            <strong>Patient:</strong> ${n}<br>
            <strong>Specialist:</strong> ${d}<br>
            <strong>Schedule:</strong> ${dt} at ${tm}
        `;
        document.getElementById('tokenBox').style.display = "block";
    }

    function showAdmin() {
        document.getElementById('userApp').style.display="none";
        document.getElementById('adminLogin').style.display="block";
    }

    function adminAuth() {
        if(document.getElementById('adminPass').value === PASS){
            document.getElementById('adminLogin').style.display="none";
            document.getElementById('adminPanel').style.display="block";
            loadTable();
        } else alert("Invalid administrative credentials.");
    }

    function loadTable() {
        let tbody = document.querySelector("#appTable tbody");
        tbody.innerHTML = "";
        data.forEach(x => {
            tbody.innerHTML += `<tr>
            <td><strong>${x.token}</strong></td><td>${x.name}</td><td>${x.doctor}</td>
            <td>${x.date}</td><td>${x.time}</td></tr>`;
        });
    }

    function clearAll() {
        if(confirm("Are you sure you want to delete all medical records?")){
            data = [];
            localStorage.setItem("appointments","[]");
            loadTable();
        }
    }

    function downloadPDF() {
        let text = "MedCare Appointments Report\n" + "=".repeat(30) + "\n\n";
        data.forEach(x => {
            text += `Token: ${x.token} | Patient: ${x.name} | Dr: ${x.doctor} | Time: ${x.date} ${x.time}\n`;
        });
        let blob = new Blob([text], { type: "text/plain" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "MedCare_Appointments.txt";
        a.click();
    }
</script>

</body>
</html>
