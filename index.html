<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCare | Patient Booking System</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { color: #1e293b; text-align: center; margin-bottom: 25px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--secondary); font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }

        /* Token Styling */
        .token-card {
            margin-top: 25px;
            padding: 20px;
            border: 2px dashed var(--primary);
            border-radius: 12px;
            background: #eff6ff;
            display: none;
        }

        .token-header { 
            text-align: center; 
            border-bottom: 1px solid #bfdbfe; 
            margin-bottom: 15px; 
            padding-bottom: 10px;
        }

        .token-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.95rem;
        }

        .token-details div { margin-bottom: 5px; }

        .print-btn { background: var(--secondary); }

        @media print {
            body * { visibility: hidden; }
            #tokenDisplay, #tokenDisplay * { visibility: visible; }
            #tokenDisplay { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                border: 1px solid #000; 
                display: block !important;
            }
            .print-btn { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🩺 MedCare Appointment</h2>
    
    <div class="form-grid">
        <div class="form-group full-width">
            <label>Patient Full Name</label>
            <input type="text" id="userName" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="userAge" placeholder="Years">
        </div>

        <div class="form-group">
            <label>Sex</label>
            <select id="userSex">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>Select Doctor</label>
            <select id="doctorSelect">
                <option value="Dr. Smith (Cardiology)">Dr. Smith (Cardiology)</option>
                <option value="Dr. Sarah (Pediatrics)">Dr. Sarah (Pediatrics)</option>
                <option value="Dr. Lee (Neurology)">Dr. Lee (Neurology)</option>
                <option value="Dr. Patel (Dermatology)">Dr. Patel (Dermatology)</option>
                <option value="Dr. Wong (General Medicine)">Dr. Wong (General Medicine)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="appDate">
        </div>

        <div class="form-group">
            <label>Time</label>
            <input type="time" id="appTime">
        </div>
    </div>

    <button onclick="bookAppointment()">Confirm & Generate Token</button>

    <div id="tokenDisplay" class="token-card">
        <div class="token-header">
            <h3 style="margin:0;">OFFICIAL APPOINTMENT TOKEN</h3>
            <small id="tID" style="color: var(--primary); font-weight: bold;"></small>
        </div>
        
        <div class="token-details">
            <div class="full-width"><strong>Patient:</strong> <span id="tName"></span></div>
            <div><strong>Age:</strong> <span id="tAge"></span></div>
            <div><strong>Sex:</strong> <span id="tSex"></span></div>
            <div class="full-width"><strong>Doctor:</strong> <span id="tDoctor"></span></div>
            <div><strong>Date:</strong> <span id="tDate"></span></div>
            <div><strong>Time:</strong> <span id="tTime"></span></div>
        </div>

        <button class="print-btn" onclick="window.print()">Print Token</button>
    </div>
</div>

<script>
    // Initialize Data from LocalStorage
    let appointments = JSON.parse(localStorage.getItem('appointments')) || [];

    function bookAppointment() {
        const name = document.getElementById('userName').value;
        const age = document.getElementById('userAge').value;
        const sex = document.getElementById('userSex').value;
        const doctor = document.getElementById('doctorSelect').value;
        const date = document.getElementById('appDate').value;
        const time = document.getElementById('appTime').value;

        // Basic Validation
        if(!name || !age || !date || !time) {
            alert("Please complete all fields.");
            return;
        }

        // Logic 1: Limit 32 appointments per doctor
        const doctorCount = appointments.filter(a => a.doctor === doctor).length;
        if(doctorCount >= 32) {
            alert(`Sorry, ${doctor} is fully booked today.`);
            return;
        }

        // Logic 2: Limit 5 appointments per person name
        const userCount = appointments.filter(a => a.name.toLowerCase() === name.toLowerCase()).length;
        if(userCount >= 5) {
            alert("You have already reached the maximum of 5 appointments.");
            return;
        }

        // Create appointment object
        const newApp = {
            id: 'REF-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
            name, age, sex, doctor, date, time
        };

        // Save to Persistent Storage
        appointments.push(newApp);
        localStorage.setItem('appointments', JSON.stringify(appointments));

        // Update UI and show Token
        renderToken(newApp);
    }

    function renderToken(app) {
        document.getElementById('tName').innerText = app.name;
        document.getElementById('tAge').innerText = app.age;
        document.getElementById('tSex').innerText = app.sex;
        document.getElementById('tDoctor').innerText = app.doctor;
        document.getElementById('tDate').innerText = app.date;
        document.getElementById('tTime').innerText = app.time;
        document.getElementById('tID').innerText = app.id;
        
        document.getElementById('tokenDisplay').style.display = 'block';
        document.getElementById('tokenDisplay').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
